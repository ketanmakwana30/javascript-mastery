    <title>LAZY LOADING</title>

    <div class="container">
      <section class="hero">

          Lazy loading Images with <br />

      <section><h2>Your First Image 👇</h2></section>
      <section>
        <img

          alt=""
        />
      </section>
      <section><h2>Your Second Image 👇</h2></section>
      <section>
        <img
          data-src="https://i.pinimg.com/1200x/b1/39/a4/b139a413c938e47db778d47ca0bdba18.jpg"
          alt=""
        />
      </section>
      <section><h2>Your Third Image 👇</h2></section>
      <section>
        <img
          data-src="https://i.pinimg.com/736x/13/e9/97/13e9970e00b71b51163de5611ec738bd.jpg"
          alt=""
        />
      </section>
      <section><h2>Your Fourth Image 👇</h2></section>
