<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modern Counter</title>
    <style>
      /* Reset and base styles */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #121214;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 20px;
        letter-spacing: 1px;
        color: #e1e1e6;
      }

      /* Counter Display Box */
      div {
        font-size: 3.5rem;
        font-weight: bold;
        padding: 20px 60px;
        background-color: #202024;
        border: 2px solid #323238;
        border-radius: 12px;
        min-width: 150px;
        text-align: center;
        margin: 30px 0;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        transition: all 0.2s ease;
      }

      /* Button Container for alignment */
      .btn-container {
        display: flex;
        gap: 12px;
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        box-shadow: none;
      }

      /* Common Button Styles */
      button {
        font-size: 1rem;
        font-weight: 600;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition:
          transform 0.1s ease,
          filter 0.2s ease;
      }

      button:hover {
        filter: brightness(1.2);
      }

      button:active {
        transform: scale(0.95);
      }

      /* Contextual Button Colors */
      .inc {
        background-color: #04d361;
        color: #000000;
      }

      .dec {
        background-color: #a8a8b3;
        color: #121214;
      }

      .reset {
        background-color: #f75a68;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <h1>Counter</h1>

    <div>0</div>

    <div class="btn-container">
      <button class="inc">Increase</button>
      <button class="dec">Decrease</button>
      <button class="reset">Reset</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
